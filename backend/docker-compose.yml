version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airiss_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-airiss_v4}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airiss_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-airiss_v4}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "${PORT:-8000}:8000"
    command: uvicorn app.main_refactored:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./airiss-v4-frontend
      dockerfile: Dockerfile
    container_name: airiss_frontend
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./airiss-v4-frontend:/app
      - /app/node_modules

volumes:
  postgres_data: