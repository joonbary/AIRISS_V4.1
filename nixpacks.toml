# Nixpacks configuration for Railway
[phases.setup]
nixPkgs = ["python39", "curl"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt || pip install -r requirements_minimal.txt"
]

[phases.build]
cmds = [
    "python railway_env_setup.py",
    "echo 'Build complete'"
]

[start]
cmd = "python test_app.py"